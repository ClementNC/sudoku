<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudoku</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header>
      <div class="logo">Sudoku</div>
      <div class="header-right">
        <button class="icon-btn" id="themeToggle" title="Toggle theme"></button>
      </div>
    </header>

    <div class="stats-row">
      <div class="timer-group">
        <div class="timer" id="timer">0:00</div>
        <button class="pause-btn" id="pauseBtn" title="Pause (Space)"></button>
      </div>
      <span class="diff-pill medium" id="diffPill">Medium</span>
      <div class="mistakes-badge">
        <span style="font-size: 12px; font-weight: 500">Mistakes</span>
        <div class="mistake-dots">
          <div class="mistake-dot" id="md0"></div>
          <div class="mistake-dot" id="md1"></div>
          <div class="mistake-dot" id="md2"></div>
        </div>
      </div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board">
        <div class="loading-board"><div class="spinner"></div></div>
      </div>
      <div class="pause-screen" id="pauseScreen">
        <div class="pause-screen-icon" id="pauseScreenIcon"></div>
        <div class="pause-screen-text">Game Paused</div>
        <div class="pause-screen-sub">Tap to resume</div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="undoBtn" title="Undo (Ctrl+Z)">
        <span>Undo</span>
      </button>
      <button class="ctrl-btn" id="eraseBtn" title="Erase">
        <span>Erase</span>
      </button>
      <button class="ctrl-btn" id="noteBtn" title="Toggle notes (N)">
        <span>Notes</span>
      </button>
      <button class="ctrl-btn hint-btn" id="hintBtn" title="Hint">
        <span>Hint</span>
        <span class="hint-count" id="hintCount">3 left</span>
      </button>
    </div>

    <div class="numpad" id="numpad"></div>

    <div class="bottom-actions">
      <button class="action-btn outline" id="restartBtn">Restart</button>
      <button class="action-btn filled" id="newGameBtn">New Game</button>
    </div>

    <div class="overlay" id="winOverlay">
      <div class="modal">
        <div class="modal-emoji">🎉</div>
        <div class="modal-title">Solved!</div>
        <div class="modal-sub" id="winSubtitle"></div>
        <div class="modal-actions">
          <button class="modal-btn primary" id="winNewGame">New Game</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="gameOverOverlay">
      <div class="modal">
        <div class="modal-title">Game Over</div>
        <div class="modal-sub" id="gameOverSub"></div>
        <div class="modal-actions">
          <button class="modal-btn primary" id="goRestart">
            <svg
              style="
                width: 15px;
                height: 15px;
                vertical-align: -3px;
                margin-right: 6px;
              "
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 12a9 9 0 1 0 3-6.7L3 8" />
              <path d="M3 3v5h5" /></svg
            >Try Again
          </button>
          <button class="modal-btn secondary" id="goNewGame">New Game</button>
        </div>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
